name: Bug Report
description: Report a bug or defect in the Eagle plugin
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open Obsidian with Eagle running
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files involved
      description: Which source files are related to this bug? (if known)
      placeholder: |
        - `src/upload/...` — upload logic
        - `src/settings/...` — settings UI
    validations:
      required: false

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: e.g., 1.7.2
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g., 2.7.3
    validations:
      required: false
